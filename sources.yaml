sources:
  adzuna:
    enabled: true
    app_id: ${ADZUNA_APP_ID}
    app_key: ${ADZUNA_APP_KEY}
    countries: [us]          # JobScout is US-only

  remotive:
    enabled: true            # free public API, no key, remote tech jobs

  arbeitnow:
    enabled: true            # free public API, no key

  jobicy:
    enabled: true            # free public API, no key, remote jobs

  remoteok:
    enabled: true            # free public API, no key (attribution via job URL)

  workingnomads:
    enabled: true            # free public API, no key, remote jobs

  themuse:
    enabled: true            # free public API, optional key

  greenhouse:
    enabled: true            # public per-company board API, no key
    # Each company: board token + employee-count bucket (exact value used by the
    # company-size filter; LLM enrichment estimates size for other sources).
    companies:
      # Cap-exempt nonprofit / research orgs FIRST so a bounded/quota-limited ingest
      # reaches them before the large for-profit boards (they're the scarce signal).
      # type=nonprofit → cap_exempt derived "likely" (can sponsor H-1B off-lottery).
      # VERIFIED live via direct probe (counts noted); tech-forward orgs w/ eng+data roles.
      - {token: givewell, size: "51-200", type: nonprofit}      # (14 jobs)
      - {token: wri, size: "1001-5000", type: nonprofit}        # World Resources Institute (1)
      - {token: mozilla, size: "1001-5000", type: nonprofit}    # Mozilla (39 jobs)
      - {token: khanacademy, size: "201-500", type: nonprofit}  # Khan Academy (27 jobs)
      # (thebridgespangroup removed — Greenhouse board 404s.)
      # For-profit boards (large, mostly already-ingested → cheap reuse).
      - {token: stripe, size: "5000+"}
      - {token: databricks, size: "1001-5000"}
      - {token: gitlab, size: "1001-5000"}
      - {token: airbnb, size: "5000+"}
      - {token: coinbase, size: "5000+"}
      - {token: reddit, size: "1001-5000"}
      - {token: dropbox, size: "1001-5000"}
      - {token: robinhood, size: "1001-5000"}
      - {token: instacart, size: "1001-5000"}
      - {token: doordash, size: "5000+"}
      - {token: pinterest, size: "1001-5000"}
      - {token: brex, size: "501-1000"}
      - {token: anthropic, size: "501-1000"}
      - {token: notion, size: "201-500"}
      - {token: figma, size: "501-1000"}
      - {token: rampcom, size: "501-1000"}

  lever:
    enabled: true            # public per-company postings API, no key
    # Only verified-working Lever slugs (others 404 and are skipped).
    companies:
      - {token: spotify, size: "5000+"}
      - {token: netflix, size: "5000+"}

  ashby:
    enabled: true            # public Ashby posting API, no key; per-company boards (startups)
    # Each company: Ashby job-board slug (from jobs.ashbyhq.com/{slug}) + employer_type.
    # Verified live via scripts/smoke_adapters.py (ramp → 111 jobs). Mostly for-profit startups;
    # tag any cap-exempt org as nonprofit/university. Populate at scale via discover_companies.py.
    companies:
      - {token: ramp, type: for_profit, size: "501-1000"}
      - {token: openai, type: for_profit, size: "1001-5000"}   # verified US board

  workable:
    enabled: true            # public widget API (?details=true), no key
    # Each account: Workable subdomain slug + employer_type for cap-exempt stamping.
    # Verified live via scripts/smoke_adapters.py (braven → 60 US jobs incl. SWE).
    accounts:
      - {token: braven, type: nonprofit}      # US nonprofit (education access)
      # Verified US-jobs slugs (zego dropped — UK-only):
      - {token: mlabs, type: for_profit, size: "51-200"}
      - {token: cynet-corp, type: for_profit, size: "51-200"}
      - {token: 33usa, type: for_profit, size: "1-50"}
      - {token: dof, type: for_profit, size: "201-500"}
      - {token: m-files, type: for_profit, size: "201-500"}
      - {token: nogigiddy, type: for_profit, size: "51-200"}   # high US volume (gig roles)

  workday:
    enabled: true            # public CXS API; universities / academic medical centers / nonprofits (cap-exempt)
    fetch_descriptions: true # one extra request per job for the full description
    # Curated tenants: {tenant, region (wd1/wd5/wd12/…), site, type, name}. `name`
    # is the employer label stamped onto jobs (Workday listings omit it). Each
    # tenant is a distinct domain whose robots.txt is checked independently.
    # Add more with: python scripts/probe_workday.py --write-sources
    tenants:
      - {tenant: cornell, region: wd1,  site: cornellCareerPage,        type: university, name: Cornell University}
      - {tenant: nyp,     region: wd1,  site: nypcareers,               type: hospital,   name: NewYork-Presbyterian}
      - {tenant: nyuhs,   region: wd12, site: nyuhscareers1,            type: hospital,   name: NYU Langone Health}
      - {tenant: trumed,  region: wd1,  site: TMC_External_Career_Site, type: hospital,   name: Truman Medical Centers}

  rippling:
    enabled: false           # public Rippling ATS Job Board API, no key; per-company boards
    fetch_descriptions: true # one extra request per job for the full description
    # Each company: Rippling board slug (from ats.rippling.com/{slug}) + employer_type.
    # Tag cap-exempt orgs that host on Rippling as nonprofit/university; for-profit → cap_exempt "no".
    companies:
      - {token: tavernresearch, type: for_profit}

  recruitee:
    enabled: true            # public Recruitee offers API, no key; per-company boards
    # Each company: Recruitee subdomain (from {slug}.recruitee.com) + employer_type.
    companies:
      - {token: tether, type: for_profit}
      # Verified US-jobs slugs:
      - {token: altiussearchgroup, type: for_profit, size: "51-200"}
      - {token: anywhereworks, type: for_profit, size: "201-500"}
      - {token: greatminds, type: for_profit, size: "201-500"}
      - {token: kravet, type: for_profit, size: "201-500"}
      - {token: nucsai, type: for_profit, size: "1-50"}

  smartrecruiters:
    enabled: true            # public SmartRecruiters Posting API; reaches bigger firms
    fetch_descriptions: true # one extra request per job for the full description
    # Each company: SmartRecruiters company identifier (e.g. Visa, ServiceNow, Bosch).
    companies:
      - {token: Visa, type: for_profit}
      - {token: ServiceNow, type: for_profit}

  himalayas:
    enabled: true            # public JSON API, no key required, full descriptions

  rss:
    enabled: true
    feeds:
      - url: https://weworkremotely.com/categories/remote-programming-jobs.rss
        type: for_profit
      - url: https://weworkremotely.com/categories/remote-data-science-jobs.rss
        type: for_profit
      - url: https://weworkremotely.com/categories/remote-devops-sysadmin-jobs.rss
        type: for_profit

  jobrightai:
    enabled: false           # keyword aggregator (jobright.ai SSR __NEXT_DATA__ JSON).
    # Good aggregated collection (even annotates H-1B status), but FRAGILE — it parses
    # embedded page JSON that can change without notice, so it ships OFF and must never
    # be a load-bearing source. Smoke-test + re-validate before enabling.

  jobspy:
    enabled: false           # opt-in; scrapes LinkedIn/Indeed/Glassdoor (high risk)
    sites: [google, zip_recruiter]
    hours_old: 168
